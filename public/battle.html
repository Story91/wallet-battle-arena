<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet Battle Arena</title>
<meta property="og:title" content="Wallet Battle Arena">
<meta property="og:description" content="Two wallets enter. One leaves victorious.">
<meta property="og:image" content="">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #0a0a1a;
    --bg-card: #12122a;
    --bg-card-inner: #1a1a3a;
    --text-primary: #e8e8f0;
    --text-secondary: #8888aa;
    --text-dim: #555577;
    --accent-gold: #ffd700;
    --accent-red: #ff4444;
    --accent-blue: #4488ff;
    --accent-purple: #aa44ff;
    --accent-yellow: #ffcc00;
    --accent-green: #44ff88;
    --accent-cyan: #44ffff;
    --rarity-bronze: #cd7f32;
    --rarity-silver: #c0c0c0;
    --rarity-gold: #ffd700;
    --rarity-diamond: #b9f2ff;
    --stat-atk: #ff4444;
    --stat-def: #4488ff;
    --stat-int: #aa44ff;
    --stat-spd: #ffcc00;
    --stat-cha: #44ff88;
    --stat-lck: #44ffff;
    --card-rarity: var(--rarity-gold);
  }

  @font-face {
    font-family: 'SystemUI';
    src: local('Segoe UI'), local('Roboto'), local('Helvetica Neue'), local('Arial');
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== BACKGROUND EFFECTS ===== */
  .bg-effects {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .bg-effects::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      radial-gradient(ellipse 600px 600px at 20% 30%, rgba(100, 40, 200, 0.08) 0%, transparent 70%),
      radial-gradient(ellipse 500px 500px at 80% 60%, rgba(40, 100, 200, 0.06) 0%, transparent 70%),
      radial-gradient(ellipse 400px 400px at 50% 80%, rgba(200, 40, 100, 0.05) 0%, transparent 70%);
    animation: bgDrift 20s ease-in-out infinite alternate;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(100, 100, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(100, 100, 255, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .bg-particles {
    position: absolute;
    inset: 0;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    animation: particleFloat linear infinite;
  }

  @keyframes particleFloat {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  @keyframes bgDrift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-3%, -2%) rotate(2deg); }
  }

  /* ===== LOADING ===== */
  .loading-screen {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: var(--bg-deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }

  .loading-screen.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .loading-swords {
    font-size: 3rem;
    animation: swordClash 1s ease-in-out infinite;
    margin-bottom: 1.5rem;
  }

  @keyframes swordClash {
    0%, 100% { transform: scaleX(1); }
    50% { transform: scaleX(1.15); filter: brightness(1.5); }
  }

  .loading-text {
    font-size: 1.2rem;
    color: var(--text-secondary);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .loading-bar {
    width: 200px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    margin-top: 1rem;
    overflow: hidden;
  }

  .loading-bar-fill {
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
    border-radius: 3px;
    animation: loadSlide 1.2s ease-in-out infinite;
  }

  @keyframes loadSlide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }

  /* ===== ERROR STATE ===== */
  .error-screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    background: var(--bg-deep);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .error-screen.visible { display: flex; }

  .error-icon { font-size: 4rem; margin-bottom: 1rem; }

  .error-title {
    font-size: 1.5rem;
    color: var(--accent-red);
    margin-bottom: 0.5rem;
  }

  .error-message {
    color: var(--text-secondary);
    margin-bottom: 2rem;
    max-width: 400px;
  }

  /* ===== MAIN LAYOUT ===== */
  .arena {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .arena.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== HEADER ===== */
  .arena-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .arena-title {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--accent-gold) 50%, #fff 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
    margin-bottom: 0.3rem;
  }

  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .arena-subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* ===== BATTLEFIELD ===== */
  .battlefield {
    display: flex;
    align-items: stretch;
    gap: 0;
    justify-content: center;
    margin-bottom: 2.5rem;
  }

  /* ===== VS DIVIDER ===== */
  .vs-divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 1rem;
    position: relative;
    z-index: 5;
    flex-shrink: 0;
  }

  .vs-line {
    width: 2px;
    flex: 1;
    background: linear-gradient(180deg, transparent, rgba(255,215,0,0.3), transparent);
  }

  .vs-badge {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: radial-gradient(circle, #2a1a40, #1a0a2a);
    border: 2px solid rgba(255, 215, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent-gold);
    letter-spacing: 0.05em;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    box-shadow:
      0 0 30px rgba(255, 215, 0, 0.15),
      inset 0 0 20px rgba(255, 215, 0, 0.05);
    animation: vsPulse 2s ease-in-out infinite;
    margin: 1rem 0;
    flex-shrink: 0;
  }

  @keyframes vsPulse {
    0%, 100% {
      transform: scale(1);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.15), inset 0 0 20px rgba(255, 215, 0, 0.05);
    }
    50% {
      transform: scale(1.1);
      box-shadow: 0 0 50px rgba(255, 215, 0, 0.3), inset 0 0 30px rgba(255, 215, 0, 0.1);
    }
  }

  /* ===== PLAYER CARD ===== */
  .player-card {
    --rarity: var(--rarity-gold);
    flex: 1;
    max-width: 460px;
    background: var(--bg-card);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease;
  }

  .player-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 20px;
    padding: 2px;
    background: linear-gradient(
      135deg,
      var(--rarity) 0%,
      transparent 40%,
      transparent 60%,
      var(--rarity) 100%
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.6;
    animation: borderGlow 4s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes borderGlow {
    0% { opacity: 0.4; }
    100% { opacity: 0.8; }
  }

  .player-card::after {
    content: '';
    position: absolute;
    top: -80%;
    left: -80%;
    width: 260%;
    height: 260%;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      rgba(255, 255, 255, 0.03) 10deg,
      transparent 20deg
    );
    animation: cardShine 8s linear infinite;
    pointer-events: none;
  }

  @keyframes cardShine {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .player-card:hover {
    transform: translateY(-4px);
  }

  .player-card.winner-card {
    box-shadow: 0 0 60px rgba(var(--rarity-rgb, 255, 215, 0), 0.2);
  }

  .card-inner {
    position: relative;
    z-index: 2;
    padding: 1.8rem 1.5rem 1.5rem;
  }

  /* Winner crown */
  .winner-crown {
    display: none;
    position: absolute;
    top: -8px;
    right: 16px;
    font-size: 2rem;
    filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.6));
    animation: crownBounce 2s ease-in-out infinite;
    z-index: 10;
  }

  .winner-card .winner-crown { display: block; }

  @keyframes crownBounce {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-6px) rotate(5deg); }
  }

  /* ===== CARD HEADER ===== */
  .card-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .avatar-wrapper {
    position: relative;
    flex-shrink: 0;
  }

  .avatar-ring {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, var(--rarity), transparent, var(--rarity));
    animation: ringRotate 6s linear infinite;
  }

  @keyframes ringRotate {
    0% { background: linear-gradient(0deg, var(--rarity), transparent, var(--rarity)); }
    25% { background: linear-gradient(90deg, var(--rarity), transparent, var(--rarity)); }
    50% { background: linear-gradient(180deg, var(--rarity), transparent, var(--rarity)); }
    75% { background: linear-gradient(270deg, var(--rarity), transparent, var(--rarity)); }
    100% { background: linear-gradient(360deg, var(--rarity), transparent, var(--rarity)); }
  }

  .avatar {
    width: 62px;
    height: 62px;
    border-radius: 50%;
    overflow: hidden;
    background: var(--bg-card-inner);
  }

  .avatar svg {
    width: 100%;
    height: 100%;
  }

  .card-identity {
    flex: 1;
    min-width: 0;
  }

  .card-address {
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-bottom: 0.25rem;
    letter-spacing: 0.02em;
  }

  .card-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--accent-gold);
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-rarity-tag {
    display: inline-block;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 700;
    color: var(--rarity);
    background: rgba(255, 255, 255, 0.04);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    margin-top: 0.2rem;
  }

  /* Level badge */
  .level-badge {
    position: relative;
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }

  .level-ring {
    position: absolute;
    inset: 0;
  }

  .level-ring circle {
    fill: none;
    stroke-width: 3;
  }

  .level-ring .ring-bg {
    stroke: rgba(255, 255, 255, 0.06);
  }

  .level-ring .ring-fill {
    stroke: var(--rarity);
    stroke-dasharray: 126;
    stroke-dashoffset: 126;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 1.5s ease-out;
    filter: drop-shadow(0 0 4px var(--rarity));
  }

  .level-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: 800;
    color: var(--text-primary);
  }

  .level-label {
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* ===== POWER LEVEL ===== */
  .power-section {
    text-align: center;
    margin-bottom: 1.5rem;
    padding: 0.8rem;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .power-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    margin-bottom: 0.3rem;
  }

  .power-value {
    font-size: 1.6rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-gold), #ffaa00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.02em;
  }

  .power-unit {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-left: 2px;
  }

  /* ===== STAT BARS ===== */
  .stats-grid {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-bottom: 1.2rem;
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .stat-icon {
    width: 22px;
    text-align: center;
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .stat-name {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    width: 30px;
    flex-shrink: 0;
  }

  .stat-bar-wrapper {
    flex: 1;
    height: 10px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 5px;
    overflow: hidden;
    position: relative;
  }

  .stat-bar-fill {
    height: 100%;
    border-radius: 5px;
    width: 0%;
    transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    overflow: hidden;
  }

  .stat-bar-fill::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent);
    border-radius: 5px 5px 0 0;
  }

  .stat-bar-fill.atk { background: linear-gradient(90deg, var(--stat-atk), #ff6666); }
  .stat-bar-fill.def { background: linear-gradient(90deg, var(--stat-def), #66aaff); }
  .stat-bar-fill.int { background: linear-gradient(90deg, var(--stat-int), #cc66ff); }
  .stat-bar-fill.spd { background: linear-gradient(90deg, var(--stat-spd), #ffdd44); }
  .stat-bar-fill.cha { background: linear-gradient(90deg, var(--stat-cha), #66ffaa); }
  .stat-bar-fill.lck { background: linear-gradient(90deg, var(--stat-lck), #66ffff); }

  .stat-value {
    font-size: 0.75rem;
    font-weight: 700;
    width: 28px;
    text-align: right;
    flex-shrink: 0;
    font-family: 'Courier New', monospace;
  }

  .stat-bar-label {
    font-size: 0.55rem;
    color: var(--text-dim);
    flex: 1;
    text-align: right;
    display: none;
  }

  /* ===== TOTAL SCORE ===== */
  .total-score {
    text-align: center;
    padding: 0.8rem;
    background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.04));
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .total-score-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    margin-bottom: 0.2rem;
  }

  .total-score-value {
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--text-primary), var(--rarity));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.05em;
  }

  /* ===== WINNER BANNER ===== */
  .winner-banner {
    text-align: center;
    margin-bottom: 2rem;
    position: relative;
    padding: 2rem 1rem;
  }

  .winner-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 100% at 50% 50%, rgba(255, 215, 0, 0.06), transparent);
    pointer-events: none;
  }

  .winner-text-container {
    position: relative;
  }

  .winner-announcement {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }

  .winner-name {
    font-size: 1.8rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    animation: winnerGlow 2s ease-in-out infinite alternate;
    margin-bottom: 0.3rem;
  }

  .winner-name.gold-text {
    background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite, winnerPulse 2s ease-in-out infinite alternate;
  }

  .winner-name.draw-text {
    color: var(--accent-cyan);
    text-shadow: 0 0 30px rgba(68, 255, 255, 0.3);
  }

  @keyframes winnerGlow {
    0% { filter: brightness(1) drop-shadow(0 0 10px rgba(255, 215, 0, 0.2)); }
    100% { filter: brightness(1.1) drop-shadow(0 0 25px rgba(255, 215, 0, 0.4)); }
  }

  @keyframes winnerPulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.02); }
  }

  .winner-score-diff {
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  .winner-score-diff span {
    color: var(--accent-gold);
    font-weight: 700;
  }

  .draw-subtitle {
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  /* ===== ENS NAME ===== */
  .card-ens {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent-gold);
    margin-bottom: 2px;
    letter-spacing: 0.02em;
  }

  /* ===== WIN RATE + TRADE INFO ===== */
  .card-meta {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 0.8rem;
    padding: 0.5rem 0.6rem;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .meta-value {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-primary);
  }

  .meta-value.win-rate { color: #44ff88; }
  .meta-value.trades { color: var(--stat-spd); }
  .meta-value.tokens-count { color: var(--stat-int); }

  .meta-label {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }

  /* ===== TOKEN HOLDINGS ===== */
  .token-holdings {
    width: 100%;
    margin-bottom: 0.8rem;
  }

  .token-holdings-title {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
    text-align: left;
  }

  .token-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .token-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 6px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.015);
  }

  .token-symbol {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .token-value {
    font-size: 0.65rem;
    color: var(--text-dim);
    font-family: 'Courier New', monospace;
  }

  /* ===== BATTLE BREAKDOWN ===== */
  .breakdown {
    max-width: 900px;
    margin: 0 auto 2.5rem;
    padding: 0 1rem;
  }

  .breakdown-title {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    position: relative;
  }

  .breakdown-title::after {
    content: '';
    display: block;
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
    margin: 0.5rem auto 0;
  }

  .breakdown-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  @media (max-width: 640px) {
    .breakdown-grid { grid-template-columns: 1fr; }
  }

  .breakdown-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 14px;
    padding: 1.2rem;
    transition: border-color 0.3s;
  }

  .breakdown-card:hover {
    border-color: rgba(255, 255, 255, 0.12);
  }

  .breakdown-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.6rem;
  }

  .breakdown-icon {
    font-size: 1.3rem;
    width: 28px;
    text-align: center;
  }

  .breakdown-stat-name {
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  .breakdown-stat-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .breakdown-desc {
    font-size: 0.78rem;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 0.8rem;
  }

  .breakdown-comparison {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    padding: 0.5rem 0.7rem;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 8px;
  }

  .breakdown-score {
    font-weight: 700;
    font-family: 'Courier New', monospace;
    min-width: 24px;
    text-align: center;
  }

  .breakdown-bar-track {
    flex: 1;
    height: 6px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .breakdown-bar-a, .breakdown-bar-b {
    position: absolute;
    top: 0;
    height: 100%;
    border-radius: 3px;
    transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .breakdown-bar-a {
    left: 0;
    background: linear-gradient(90deg, #ff4444, #ff6666);
  }

  .breakdown-bar-b {
    right: 0;
    background: linear-gradient(90deg, #4488ff, #66aaff);
  }

  .breakdown-winner-tag {
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(255, 215, 0, 0.15);
    color: var(--accent-gold);
  }

  .breakdown-winner-tag.draw {
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-dim);
  }

  .breakdown-winner-tag.a-wins { color: #ff6666; background: rgba(255, 68, 68, 0.12); }
  .breakdown-winner-tag.b-wins { color: #66aaff; background: rgba(68, 136, 255, 0.12); }

  .breakdown-addr {
    font-size: 0.65rem;
    color: var(--text-dim);
    font-family: 'Courier New', monospace;
  }

  /* ===== ACTIONS ===== */
  .actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.8rem 1.8rem;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    border: none;
    transition: all 0.3s ease;
    text-decoration: none;
    font-family: inherit;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent-purple), #7722cc);
    color: #fff;
    box-shadow: 0 4px 20px rgba(170, 68, 255, 0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(170, 68, 255, 0.4);
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-primary);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateY(-2px);
  }

  .btn-share {
    background: linear-gradient(135deg, var(--accent-gold), #cc9900);
    color: #1a1a2e;
  }

  .btn-share:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255, 215, 0, 0.3);
  }

  .share-toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-card);
    color: var(--accent-green);
    padding: 0.8rem 1.5rem;
    border-radius: 10px;
    border: 1px solid rgba(68, 255, 136, 0.2);
    font-size: 0.85rem;
    font-weight: 600;
    z-index: 100;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
  }

  .share-toast.visible {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ===== FOOTER / BRANDING ===== */
  .footer {
    text-align: center;
    padding: 1.5rem 0;
    border-top: 1px solid rgba(255, 255, 255, 0.04);
  }

  .footer-brand {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .footer-brand a {
    color: var(--accent-purple);
    text-decoration: none;
    font-weight: 600;
  }

  .footer-brand a:hover {
    text-decoration: underline;
  }

  .footer-timestamp {
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
    opacity: 0.6;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .battlefield {
      flex-direction: column;
      align-items: center;
    }

    .player-card {
      max-width: 100%;
      width: 100%;
    }

    .vs-divider {
      flex-direction: row;
      padding: 0.5rem 0;
    }

    .vs-line {
      width: auto;
      height: 2px;
      flex: 1;
    }

    .vs-badge {
      margin: 0 1rem;
      width: 52px;
      height: 52px;
      font-size: 1.1rem;
    }

    .arena-title {
      font-size: 1.6rem;
    }

    .winner-name {
      font-size: 1.4rem;
    }

    .card-inner {
      padding: 1.3rem 1.2rem 1.2rem;
    }
  }

  @media (max-width: 400px) {
    .arena {
      padding: 1rem 0.8rem 3rem;
    }

    .card-inner {
      padding: 1rem;
    }

    .card-header {
      gap: 0.7rem;
    }

    .avatar-ring {
      width: 56px;
      height: 56px;
    }

    .avatar {
      width: 50px;
      height: 50px;
    }

    .card-title {
      font-size: 1rem;
    }

    .level-badge {
      width: 40px;
      height: 40px;
    }

    .power-value {
      font-size: 1.3rem;
    }

    .total-score-value {
      font-size: 1.6rem;
    }
  }

  /* ===== STAGGER ANIMATIONS ===== */
  .card-a { animation: cardSlideIn 0.8s ease-out 0.2s both; }
  .card-b { animation: cardSlideIn 0.8s ease-out 0.4s both; }

  @keyframes cardSlideIn {
    0% { opacity: 0; transform: translateY(40px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .vs-divider { animation: fadeInScale 0.6s ease-out 0.5s both; }

  @keyframes fadeInScale {
    0% { opacity: 0; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1); }
  }

  .winner-banner { animation: bannerReveal 0.8s ease-out 0.8s both; }

  @keyframes bannerReveal {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .actions { animation: fadeInScale 0.6s ease-out 1s both; }
</style>
</head>
<body>

<script>
(function() {
  'use strict';

  // ===== CONFIG =====
  const STAT_CONFIG = [
    { key: 'atk', icon: '\u2694\uFE0F', label: 'ATK', fullLabel: 'Trading Power', cssClass: 'atk',
      desc: 'Measures trading profitability, win rate on trades, and total volume. High ATK means this wallet consistently makes money on swaps and trades.' },
    { key: 'def', icon: '\uD83D\uDEE1\uFE0F', label: 'DEF', fullLabel: 'Diamond Hands', cssClass: 'def',
      desc: 'How long positions are held without panic selling. Accounts for holding duration, unrealized profits (still holding winners), and low transaction frequency.' },
    { key: 'int', icon: '\uD83E\uDDE0', label: 'INT', fullLabel: 'Diversity', cssClass: 'int',
      desc: 'Portfolio intelligence \u2014 how diversified the wallet is across tokens, DEXes, and counterparties. Higher score means less risk from single-asset exposure.' },
    { key: 'spd', icon: '\u26A1', label: 'SPD', fullLabel: 'Activity', cssClass: 'spd',
      desc: 'Onchain activity level: total transaction count, recent activity in the last 7 days, and how recently the wallet was active. Speed demons never sleep.' },
    { key: 'cha', icon: '\uD83E\uDD1D', label: 'CHA', fullLabel: 'Network', cssClass: 'cha',
      desc: 'Social graph strength: number of counterparties, interactions with labeled entities (whales, protocols, DAOs), and diversity of interaction types.' },
    { key: 'lck', icon: '\uD83C\uDF40', label: 'LCK', fullLabel: 'Risk Score', cssClass: 'lck',
      desc: 'Luck & safety: low portfolio concentration (not all-in on one token), positive PnL trend, and no interactions with known scams or rugged protocols.' }
  ];

  const RARITY_COLORS = {
    bronze:  { color: '#cd7f32', rgb: '205, 127, 50' },
    silver:  { color: '#c0c0c0', rgb: '192, 192, 192' },
    gold:    { color: '#ffd700', rgb: '255, 215, 0' },
    diamond: { color: '#b9f2ff', rgb: '185, 242, 255' }
  };

  // ===== UTILITY FUNCTIONS =====

  function shortenAddress(addr) {
    if (!addr || addr.length < 10) return addr || '???';
    return addr.slice(0, 6) + '...' + addr.slice(-4);
  }

  function formatValue(val) {
    var n = parseFloat(val);
    if (isNaN(n)) return '$0';
    if (n >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return '$' + (n / 1000).toFixed(1) + 'K';
    return '$' + n.toFixed(2);
  }

  function hashCode(str) {
    var hash = 0;
    for (var i = 0; i < str.length; i++) {
      var char = str.charCodeAt(i);
      hash = ((hash << 5) - hash) + char;
      hash = hash & hash;
    }
    return Math.abs(hash);
  }

  // Deterministic pseudo-random from seed
  function seededRandom(seed) {
    var x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  // ===== DICEBEAR AVATAR =====
  var DICEBEAR_STYLE = 'bottts-neutral'; // robot avatars — perfect for crypto
  var DICEBEAR_FALLBACK = 'identicon';

  function generateAvatar(address) {
    var seed = encodeURIComponent(address.toLowerCase());
    var primary = 'https://api.dicebear.com/9.x/' + DICEBEAR_STYLE + '/svg?seed=' + seed + '&size=128&backgroundColor=transparent';
    var fallback = 'https://api.dicebear.com/9.x/' + DICEBEAR_FALLBACK + '/svg?seed=' + seed + '&size=128&backgroundColor=transparent';
    return '<img src="' + primary + '" alt="avatar" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.src=\'' + fallback + '\'">';
  }

  // ===== PARTICLES =====
  function spawnParticles() {
    var container = document.getElementById('particles');
    if (!container) return;
    for (var i = 0; i < 30; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.width = (1 + Math.random() * 2) + 'px';
      p.style.height = p.style.width;
      container.appendChild(p);
    }
  }

  // ===== STAT BAR RENDERING =====
  function renderStats(containerId, stats) {
    var container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';

    STAT_CONFIG.forEach(function(cfg) {
      var val = (stats && stats[cfg.key]) || 0;
      var row = document.createElement('div');
      row.className = 'stat-row';
      row.innerHTML =
        '<span class="stat-icon">' + cfg.icon + '</span>' +
        '<span class="stat-name">' + cfg.label + '</span>' +
        '<div class="stat-bar-wrapper">' +
          '<div class="stat-bar-fill ' + cfg.cssClass + '" data-value="' + val + '"></div>' +
        '</div>' +
        '<span class="stat-value">' + val + '</span>';
      container.appendChild(row);
    });
  }

  // ===== ANIMATE STAT BARS =====
  function animateStatBars() {
    var bars = document.querySelectorAll('.stat-bar-fill');
    bars.forEach(function(bar, index) {
      setTimeout(function() {
        var val = parseInt(bar.getAttribute('data-value'), 10) || 0;
        bar.style.width = val + '%';
      }, 200 + index * 80);
    });
  }

  // ===== ANIMATE LEVEL RINGS =====
  function animateLevelRing(ringId, level) {
    var ring = document.getElementById(ringId);
    if (!ring) return;
    var circumference = 2 * Math.PI * 20; // r=20
    var progress = Math.min(level / 100, 1);
    var offset = circumference * (1 - progress);
    setTimeout(function() {
      ring.style.strokeDashoffset = offset;
    }, 600);
  }

  // ===== SET CARD RARITY =====
  function setCardRarity(card, rarity) {
    var r = RARITY_COLORS[rarity] || RARITY_COLORS.gold;
    card.style.setProperty('--rarity', r.color);
    card.style.setProperty('--rarity-rgb', r.rgb);
  }

  // ===== POPULATE CARD =====
  function populateCard(side, data) {
    var suffix = side.toUpperCase();
    var card = document.getElementById('card' + suffix);
    if (!card || !data) return;

    setCardRarity(card, data.rarity);

    // Avatar
    var avatarEl = document.getElementById('avatar' + suffix);
    if (avatarEl) avatarEl.innerHTML = generateAvatar(data.address);

    // ENS name
    var ensEl = document.getElementById('ens' + suffix);
    if (ensEl) {
      if (data.ensName) {
        ensEl.textContent = data.ensName;
        ensEl.style.display = 'block';
      } else {
        ensEl.style.display = 'none';
      }
    }

    // Address
    var addrEl = document.getElementById('address' + suffix);
    if (addrEl) addrEl.textContent = shortenAddress(data.address);

    // Title
    var titleEl = document.getElementById('title' + suffix);
    if (titleEl) titleEl.textContent = data.title || 'Unknown Warrior';

    // Rarity tag
    var rarityTag = document.getElementById('rarityTag' + suffix);
    if (rarityTag) {
      rarityTag.textContent = (data.rarity || 'common').toUpperCase();
    }

    // Level
    var levelEl = document.getElementById('level' + suffix);
    if (levelEl) levelEl.textContent = data.level || 0;
    animateLevelRing('levelRing' + suffix, data.level || 0);

    // Power (portfolio value)
    var powerEl = document.getElementById('power' + suffix);
    if (powerEl) {
      powerEl.innerHTML = formatValue(data.portfolioValue) + '<span class="power-unit">USD</span>';
    }

    // Meta: win rate, trades, tokens count
    var metaEl = document.getElementById('meta' + suffix);
    if (metaEl) {
      var winRateVal = data.winRate !== undefined ? (data.winRate * 100).toFixed(0) + '%' : 'N/A';
      var tradesVal = data.tradedTimes || '?';
      var tokensCountVal = data.tradedTokenCount || (data.tokens ? data.tokens.length : '?');
      metaEl.innerHTML =
        '<div class="meta-item"><span class="meta-value win-rate">' + winRateVal + '</span><span class="meta-label">Win Rate</span></div>' +
        '<div class="meta-item"><span class="meta-value trades">' + tradesVal + '</span><span class="meta-label">Trades</span></div>' +
        '<div class="meta-item"><span class="meta-value tokens-count">' + tokensCountVal + '</span><span class="meta-label">Tokens</span></div>';
    }

    // Token holdings (top 5)
    var tokensEl = document.getElementById('tokens' + suffix);
    if (tokensEl && data.tokens && data.tokens.length > 0) {
      var html = '<div class="token-holdings-title">Top Holdings</div><div class="token-list">';
      data.tokens.slice(0, 5).forEach(function(t) {
        html += '<div class="token-item">' +
          '<span class="token-symbol">' + (t.symbol || '???') + '</span>' +
          '<span class="token-value">' + formatValue(t.valueUsd) + '</span>' +
        '</div>';
      });
      html += '</div>';
      tokensEl.innerHTML = html;
    } else if (tokensEl) {
      tokensEl.innerHTML = '';
    }

    // Stats
    renderStats('stats' + suffix, data.stats);

    // Total score
    var scoreEl = document.getElementById('score' + suffix);
    if (scoreEl) scoreEl.textContent = data.totalScore || 0;
  }

  // ===== WINNER BANNER =====
  function renderWinner(battleData) {
    var announcement = document.getElementById('winnerAnnouncement');
    var nameEl = document.getElementById('winnerName');
    var diffEl = document.getElementById('winnerScoreDiff');
    var cardA = document.getElementById('cardA');
    var cardB = document.getElementById('cardB');

    if (!announcement || !nameEl || !diffEl) return;

    if (battleData.winner === 'draw') {
      announcement.textContent = 'THE RESULT IS...';
      nameEl.textContent = 'DRAW!';
      nameEl.className = 'winner-name draw-text';
      diffEl.innerHTML = '<span class="draw-subtitle">Both wallets are equally matched!</span>';
    } else {
      var winnerData = battleData.winner === 'a' ? battleData.walletA : battleData.walletB;
      var winnerCard = battleData.winner === 'a' ? cardA : cardB;

      announcement.textContent = 'THE WINNER IS';
      nameEl.textContent = winnerData.title || shortenAddress(winnerData.address);
      nameEl.className = 'winner-name gold-text';

      if (battleData.scoreDiff) {
        diffEl.innerHTML = 'Won by <span>' + battleData.scoreDiff + ' points</span> | ' + shortenAddress(winnerData.address);
      } else {
        diffEl.textContent = shortenAddress(winnerData.address);
      }

      if (winnerCard) {
        winnerCard.classList.add('winner-card');
      }
    }
  }

  // ===== UPDATE OG META =====
  function updateMeta(battleData) {
    var descMeta = document.querySelector('meta[property="og:description"]');
    var imgMeta = document.querySelector('meta[property="og:image"]');

    if (descMeta && battleData.walletA && battleData.walletB) {
      var shortA = shortenAddress(battleData.walletA.address);
      var shortB = shortenAddress(battleData.walletB.address);
      descMeta.setAttribute('content', shortA + ' vs ' + shortB + ' \u2014 Who\'s the better onchain player?');
    }

    if (imgMeta && battleData.id) {
      imgMeta.setAttribute('content', '/api/battle/' + battleData.id + '/og');
    }
  }

  // ===== TIMESTAMP =====
  function renderTimestamp(ts) {
    var el = document.getElementById('timestamp');
    if (!el) return;
    if (!ts) {
      el.textContent = '';
      return;
    }
    try {
      var d = new Date(ts);
      el.textContent = 'Battle on ' + d.toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    } catch(e) {
      el.textContent = '';
    }
  }

  // ===== SHARE =====
  window.shareResult = function() {
    var url = window.location.href;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(function() {
        showToast();
      }).catch(function() {
        fallbackCopy(url);
      });
    } else {
      fallbackCopy(url);
    }
  };

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      showToast();
    } catch(e) {
      alert('Copy this URL: ' + text);
    }
    document.body.removeChild(ta);
  }

  function showToast() {
    var toast = document.getElementById('shareToast');
    if (!toast) return;
    toast.classList.add('visible');
    setTimeout(function() {
      toast.classList.remove('visible');
    }, 2500);
  }

  // ===== EXTRACT BATTLE ID FROM URL =====
  function getBattleId() {
    // Supports /battle/abc123 and /battle.html?id=abc123
    var pathMatch = window.location.pathname.match(/\/battle\/([^\/\?#]+)/);
    if (pathMatch) return pathMatch[1];

    var params = new URLSearchParams(window.location.search);
    if (params.has('id')) return params.get('id');

    // Also check hash
    var hashMatch = window.location.hash.match(/^#(.+)$/);
    if (hashMatch) return hashMatch[1];

    return null;
  }

  // ===== SHOW ERROR =====
  function showError(msg) {
    var loadScreen = document.getElementById('loadingScreen');
    var errScreen = document.getElementById('errorScreen');
    var errMsg = document.getElementById('errorMessage');

    if (loadScreen) loadScreen.classList.add('hidden');
    if (errScreen) errScreen.classList.add('visible');
    if (errMsg && msg) errMsg.textContent = msg;
  }

  // ===== BATTLE BREAKDOWN =====
  function renderBreakdown(battleData) {
    var grid = document.getElementById('breakdownGrid');
    if (!grid || !battleData.walletA || !battleData.walletB) return;
    grid.innerHTML = '';

    var statsA = battleData.walletA.stats || {};
    var statsB = battleData.walletB.stats || {};
    var addrA = shortenAddress(battleData.walletA.address);
    var addrB = shortenAddress(battleData.walletB.address);

    STAT_CONFIG.forEach(function(cfg) {
      var valA = statsA[cfg.key] || 0;
      var valB = statsB[cfg.key] || 0;
      var total = Math.max(valA + valB, 1);
      var pctA = Math.round((valA / total) * 100);
      var pctB = 100 - pctA;

      var winnerTag = '';
      if (valA > valB) {
        winnerTag = '<span class="breakdown-winner-tag a-wins">' + addrA + ' wins</span>';
      } else if (valB > valA) {
        winnerTag = '<span class="breakdown-winner-tag b-wins">' + addrB + ' wins</span>';
      } else {
        winnerTag = '<span class="breakdown-winner-tag draw">Tied</span>';
      }

      var card = document.createElement('div');
      card.className = 'breakdown-card';
      card.innerHTML =
        '<div class="breakdown-header">' +
          '<span class="breakdown-icon">' + cfg.icon + '</span>' +
          '<div>' +
            '<div class="breakdown-stat-name" style="color:var(--stat-' + cfg.cssClass + ')">' + cfg.fullLabel + '</div>' +
            '<div class="breakdown-stat-label">' + cfg.label + ' \u2014 0 to 100</div>' +
          '</div>' +
        '</div>' +
        '<div class="breakdown-desc">' + cfg.desc + '</div>' +
        '<div class="breakdown-comparison">' +
          '<span class="breakdown-addr">' + addrA + '</span>' +
          '<span class="breakdown-score" style="color:#ff6666">' + valA + '</span>' +
          '<div class="breakdown-bar-track">' +
            '<div class="breakdown-bar-a" style="width:' + pctA + '%"></div>' +
            '<div class="breakdown-bar-b" style="width:' + pctB + '%"></div>' +
          '</div>' +
          '<span class="breakdown-score" style="color:#66aaff">' + valB + '</span>' +
          '<span class="breakdown-addr">' + addrB + '</span>' +
        '</div>' +
        '<div style="text-align:right;margin-top:0.4rem">' + winnerTag + '</div>';

      grid.appendChild(card);
    });
  }

  // ===== MAIN INIT =====
  function init() {
    spawnParticles();

    var battleId = getBattleId();
    if (!battleId) {
      showError('No battle ID found in the URL.');
      return;
    }

    // Fetch battle data
    fetch('/api/battle/' + encodeURIComponent(battleId))
      .then(function(res) {
        if (!res.ok) {
          throw new Error(res.status === 404 ? 'Battle not found.' : 'Failed to load battle (HTTP ' + res.status + ')');
        }
        return res.json();
      })
      .then(function(data) {
        // Populate both cards
        populateCard('A', data.walletA);
        populateCard('B', data.walletB);

        // Winner
        renderWinner(data);

        // Breakdown
        renderBreakdown(data);

        // OG meta
        updateMeta(data);

        // Timestamp
        renderTimestamp(data.timestamp);

        // Update page title
        if (data.walletA && data.walletB) {
          document.title = shortenAddress(data.walletA.address) + ' vs ' + shortenAddress(data.walletB.address) + ' | Wallet Battle Arena';
        }

        // Reveal
        var loadScreen = document.getElementById('loadingScreen');
        var arena = document.getElementById('arena');

        setTimeout(function() {
          if (loadScreen) loadScreen.classList.add('hidden');
          if (arena) arena.classList.add('visible');

          // Animate stat bars after cards are visible
          setTimeout(animateStatBars, 400);
        }, 600);
      })
      .catch(function(err) {
        console.error('Battle fetch error:', err);
        showError(err.message || 'Could not load battle data.');
      });
  }

  // ===== BOOT =====
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
